<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hot Politics — Content Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      /* Match landing palette (monochrome on deep black) */
      --dark: #0b0b0c;
      --ink: #111113;
      --white: #f5f5f5;
      --cream: rgba(245, 245, 245, 0.78);
      --ember: rgba(245, 245, 245, 0.6);
      --hot: rgba(245, 245, 245, 0.92);
      --border: rgba(245, 245, 245, 0.12);
      --surface: rgba(245, 245, 245, 0.04);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, system-ui, sans-serif;
      background: var(--dark);
      color: var(--white);
      line-height: 1.5;
      padding: 1.5rem;
    }
    .admin-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid rgba(245,245,245,0.12);
    }
    .admin-header h1 {
      font-size: 1.5rem;
      color: var(--white);
    }
    .admin-header h1 span {
      font-family: 'Instrument Serif', ui-serif, Georgia, serif;
      font-style: italic;
      color: var(--white);
    }
    .admin-header a {
      color: var(--cream);
      text-decoration: none;
      font-size: 0.9rem;
    }
    .admin-header a:hover { text-decoration: underline; }
    .tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }
    .tabs button {
      font-family: inherit;
      background: rgba(245,245,245,0.03);
      border: 1px solid rgba(245,245,245,0.12);
      color: rgba(245,245,245,0.82);
      padding: 0.6rem 1rem;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.95rem;
    }
    .tabs button:hover { background: rgba(245,245,245,0.05); }
    .tabs button.active {
      background: rgba(245,245,245,0.14);
      border-color: rgba(245,245,245,0.22);
      color: var(--white);
    }
    .panel { display: none; }
    .panel.active { display: block; }
    .panel h2 {
      font-size: 1.25rem;
      color: var(--white);
      margin-bottom: 1rem;
    }
    .card-list { display: flex; flex-direction: column; gap: 1rem; }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem 1.25rem;
    }
    .card-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 0.75rem;
      margin-bottom: 0.75rem;
    }
    .card-title { font-size: 1rem; color: var(--white); }
    .card-actions { display: flex; gap: 0.5rem; flex-shrink: 0; }
    .btn-icon {
      background: transparent;
      border: none;
      color: rgba(245,245,245,0.75);
      opacity: 0.8;
      cursor: pointer;
      padding: 0.25rem;
      font-size: 1rem;
      line-height: 1;
    }
    .btn-icon:hover { opacity: 1; color: rgba(245,245,245,0.92); }
    .btn-icon.danger:hover { color: rgba(245,245,245,0.92); }
    .card-body { font-size: 0.9rem; opacity: 0.9; }
    .add-btn {
      font-family: inherit;
      background: var(--white);
      color: var(--dark);
      border: 1px solid rgba(245,245,245,0.12);
      font-weight: 600;
      padding: 0.65rem 1.25rem;
      border-radius: 999px;
      cursor: pointer;
      font-size: 0.9rem;
      margin-top: 0.5rem;
    }
    .add-btn:hover { filter: brightness(0.98); }
    .save-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--ink);
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      border-top: 1px solid rgba(245,245,245,0.10);
    }
    .save-bar .msg { font-size: 0.9rem; }
    .save-bar .msg.ok { color: #4caf50; }
    .save-bar .msg.err { color: rgba(245,245,245,0.9); }
    .save-btn {
      font-family: inherit;
      background: rgba(245,245,245,0.14);
      color: var(--white);
      border: 1px solid rgba(245,245,245,0.22);
      font-weight: 600;
      padding: 0.75rem 1.5rem;
      border-radius: 999px;
      cursor: pointer;
      font-size: 1rem;
    }
    .save-btn:hover { background: rgba(245,245,245,0.18); }
    .save-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    body { padding-bottom: 4rem; }
    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 1rem;
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: var(--dark);
      border: 1px solid rgba(245,245,245,0.16);
      border-radius: 12px;
      padding: 1.5rem;
      max-width: 480px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal h3 {
      color: var(--white);
      margin-bottom: 1rem;
      font-size: 1.2rem;
      font-family: 'Instrument Serif', ui-serif, Georgia, serif;
      font-style: italic;
      letter-spacing: -0.01em;
    }
    .form-group { margin-bottom: 1rem; }
    .form-group label {
      display: block;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--ember);
      margin-bottom: 0.35rem;
    }
    .form-group input,
    .form-group textarea {
      width: 100%;
      font-family: inherit;
      font-size: 0.95rem;
      padding: 0.6rem 0.75rem;
      border: 1px solid rgba(245,245,245,0.16);
      border-radius: 8px;
      background: rgba(245,245,245,0.03);
      color: rgba(245,245,245,0.9);
    }
    .form-group textarea { min-height: 80px; resize: vertical; }
    .form-group input::placeholder,
    .form-group textarea::placeholder { opacity: 0.6; }
    .modal-actions {
      display: flex;
      gap: 0.75rem;
      margin-top: 1.25rem;
    }
    .modal-actions button {
      font-family: inherit;
      padding: 0.6rem 1.2rem;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 600;
    }
    .modal-actions .btn-primary {
      background: var(--white);
      color: var(--dark);
      border: 1px solid rgba(245,245,245,0.12);
    }
    .modal-actions .btn-secondary {
      background: transparent;
      color: rgba(245,245,245,0.85);
      border: 1px solid rgba(245,245,245,0.22);
    }
    .quiz-options-list { margin-top: 0.5rem; }
    .quiz-option-row {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      margin-bottom: 0.5rem;
    }
    .quiz-option-row input { flex: 1; }
    .quiz-option-row input[type="radio"] { width: auto; flex: none; }
    .quiz-option-row .rm-opt { color: var(--hot); cursor: pointer; padding: 0.25rem; }
    .quiz-add-opt {
      background: transparent;
      border: 1px dashed rgba(245,245,245,0.22);
      color: rgba(245,245,245,0.78);
      padding: 0.5rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      margin-top: 0.25rem;
    }
  </style>
</head>
<body>
  <div class="admin-header">
    <h1>Hot <span>Politics</span> — Content Admin</h1>
    <a href="../index.html">← View landing page</a>
  </div>

  <div class="tabs">
    <button type="button" data-tab="leaders" class="active">Leaders</button>
    <button type="button" data-tab="skills">Skills</button>
    <button type="button" data-tab="quizzes">Quizzes</button>
  </div>

  <div id="panel-leaders" class="panel active">
    <h2>Party leaders (left → right)</h2>
    <div class="card-list" id="leaders-list"></div>
    <button type="button" class="add-btn" id="add-leader">+ Add leader</button>
  </div>

  <div id="panel-skills" class="panel">
    <h2>Skills you gain</h2>
    <div class="card-list" id="skills-list"></div>
    <button type="button" class="add-btn" id="add-skill">+ Add skill</button>
  </div>

  <div id="panel-quizzes" class="panel">
    <h2>Quiz questions</h2>
    <div class="card-list" id="quizzes-list"></div>
    <button type="button" class="add-btn" id="add-quiz">+ Add question</button>
  </div>

  <div class="save-bar">
    <span class="msg" id="save-msg"></span>
    <button type="button" class="save-btn" id="save-btn">Save all changes</button>
  </div>

  <div class="modal-overlay" id="modal">
    <div class="modal" id="modal-content"></div>
  </div>

  <script>
    const API = '/api/content';
    let data = { parties: [], leaders: [], skills: [], quizzes: [] };

    function uid() {
      return 'x' + Math.random().toString(36).slice(2, 11);
    }

    async function load() {
      try {
        const r = await fetch(API);
        if (r.ok) data = await r.json();
      } catch (e) {
        document.getElementById('save-msg').textContent = 'Could not load content. Run the server (npm start).';
        document.getElementById('save-msg').className = 'msg err';
      }
      data.parties = Array.isArray(data.parties) ? data.parties : [];
      data.leaders = Array.isArray(data.leaders) ? data.leaders : [];
      data.skills = Array.isArray(data.skills) ? data.skills : [];
      data.quizzes = Array.isArray(data.quizzes) ? data.quizzes : [];
      renderAll();
    }

    function renderAll() {
      renderLeaders();
      renderSkills();
      renderQuizzes();
    }

    function renderLeaders() {
      const list = document.getElementById('leaders-list');
      if (!list) return;
      const sorted = [...data.leaders].sort((a, b) => (a.spectrumOrder ?? 0) - (b.spectrumOrder ?? 0));
      list.innerHTML = sorted.map((l) => {
        const idx = data.leaders.indexOf(l);
        const values = Array.isArray(l.coreValues) ? l.coreValues.filter(Boolean) : [];
        return `
        <div class="card" data-index="${idx}">
          <div class="card-head">
            <span class="card-title">${escapeHtml(l.name || 'Untitled')}</span>
            <div class="card-actions">
              <button type="button" class="btn-icon edit-leader" title="Edit">✎</button>
              <button type="button" class="btn-icon danger delete-leader" title="Delete">✕</button>
            </div>
          </div>
          <div class="card-body">
            <div style="display:flex; gap:0.75rem; align-items:flex-start;">
              <div style="width:44px; height:44px; border-radius:12px; overflow:hidden; border:1px solid rgba(254,250,224,0.12); background:rgba(254,250,224,0.04); flex: 0 0 auto;">
                ${l.photoUrl ? `<img src="${escapeHtml(l.photoUrl)}" alt="" style="width:100%; height:100%; object-fit:cover;" />` : ''}
              </div>
              <div style="min-width:0;">
                <div style="color:var(--ember); font-size:0.8rem;">${escapeHtml(l.spectrumLabel || '')}${l.partyName ? ` · ${escapeHtml(l.partyName)}` : ''}</div>
                <div style="margin-top:0.35rem; opacity:0.9;">${escapeHtml((l.briefCv || '').slice(0, 120))}${(l.briefCv || '').length > 120 ? '…' : ''}</div>
                ${l.motto ? `<div style="margin-top:0.35rem; opacity:0.9;"><em>“${escapeHtml(l.motto)}”</em></div>` : ''}
                ${values.length ? `<div style="margin-top:0.5rem; opacity:0.9;">Values: ${escapeHtml(values.join(', '))}</div>` : ''}
              </div>
            </div>
          </div>
        </div>
      `;
      }).join('');
      list.querySelectorAll('.edit-leader').forEach(btn => btn.addEventListener('click', () => editLeader(btn.closest('.card').dataset.index)));
      list.querySelectorAll('.delete-leader').forEach(btn => btn.addEventListener('click', () => deleteLeader(btn.closest('.card').dataset.index)));
    }

    function renderSkills() {
      const list = document.getElementById('skills-list');
      const sorted = [...data.skills].sort((a,b) => (a.order ?? 0) - (b.order ?? 0));
      list.innerHTML = sorted.map((s, i) => {
        const idx = data.skills.indexOf(s);
        return `
        <div class="card" data-index="${idx}">
          <div class="card-head">
            <span class="card-title">#${s.order != null ? s.order : idx + 1} ${escapeHtml(s.title || 'Untitled')}</span>
            <div class="card-actions">
              <button type="button" class="btn-icon edit-skill" title="Edit">✎</button>
              <button type="button" class="btn-icon danger delete-skill" title="Delete">✕</button>
            </div>
          </div>
          <div class="card-body">${escapeHtml((s.description || '').slice(0, 100))}${(s.description || '').length > 100 ? '…' : ''}</div>
        </div>
      `}).join('');
      list.querySelectorAll('.edit-skill').forEach(btn => btn.addEventListener('click', () => editSkill(btn.closest('.card').dataset.index)));
      list.querySelectorAll('.delete-skill').forEach(btn => btn.addEventListener('click', () => deleteSkill(btn.closest('.card').dataset.index)));
    }

    function renderQuizzes() {
      const list = document.getElementById('quizzes-list');
      list.innerHTML = data.quizzes.map((q, i) => `
        <div class="card" data-index="${i}">
          <div class="card-head">
            <span class="card-title">Q${i + 1}: ${escapeHtml((q.question || '').slice(0, 50))}…</span>
            <div class="card-actions">
              <button type="button" class="btn-icon edit-quiz" title="Edit">✎</button>
              <button type="button" class="btn-icon danger delete-quiz" title="Delete">✕</button>
            </div>
          </div>
          <div class="card-body">${(q.options || []).length} options · correct: ${(q.options || [])[q.correct] ? 'option ' + (q.correct + 1) : '?'}</div>
        </div>
      `).join('');
      list.querySelectorAll('.edit-quiz').forEach(btn => btn.addEventListener('click', () => editQuiz(btn.closest('.card').dataset.index)));
      list.querySelectorAll('.delete-quiz').forEach(btn => btn.addEventListener('click', () => deleteQuiz(btn.closest('.card').dataset.index)));
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text == null ? '' : text;
      return div.innerHTML;
    }

    function showModal(title, formHtml) {
      const overlay = document.getElementById('modal');
      const content = document.getElementById('modal-content');
      content.innerHTML = `<h3>${title}</h3>${formHtml}`;
      overlay.classList.add('show');
    }

    function hideModal() {
      document.getElementById('modal').classList.remove('show');
    }

    document.getElementById('modal').addEventListener('click', (e) => {
      if (e.target.id === 'modal') hideModal();
    });

    // ——— Leaders ———
    function editLeader(index) {
      const l = data.leaders[+index] || {};
      const valuesText = Array.isArray(l.coreValues) ? l.coreValues.filter(Boolean).join('\n') : '';
      showModal(index === 'new' ? 'Add leader' : 'Edit leader', `
        <form id="leader-form">
          <div class="form-group">
            <label>Spectrum order (number)</label>
            <input type="number" name="spectrumOrder" value="${l.spectrumOrder != null ? l.spectrumOrder : ''}" placeholder="10 (left) … 90 (right)" />
          </div>
          <div class="form-group">
            <label>Spectrum label</label>
            <input type="text" name="spectrumLabel" value="${escapeHtml(l.spectrumLabel || '')}" placeholder="e.g. Left / Centre / Right" />
          </div>
          <div class="form-group">
            <label>Leader name</label>
            <input type="text" name="name" value="${escapeHtml(l.name || '')}" placeholder="Full name" />
          </div>
          <div class="form-group">
            <label>Party name</label>
            <input type="text" name="partyName" value="${escapeHtml(l.partyName || '')}" placeholder="Party name" />
          </div>
          <div class="form-group">
            <label>Photo URL</label>
            <input type="text" name="photoUrl" value="${escapeHtml(l.photoUrl || '')}" placeholder="https://… or assets/leaders/…" />
          </div>
          <div class="form-group">
            <label>Brief CV</label>
            <textarea name="briefCv" placeholder="1–2 sentence bio…">${escapeHtml(l.briefCv || '')}</textarea>
          </div>
          <div class="form-group">
            <label>Party motto</label>
            <input type="text" name="motto" value="${escapeHtml(l.motto || '')}" placeholder="Short motto" />
          </div>
          <div class="form-group">
            <label>Core values (one per line)</label>
            <textarea name="coreValues" placeholder="Value 1\nValue 2\nValue 3">${escapeHtml(valuesText)}</textarea>
          </div>
          <div class="form-group">
            <label>Official website URL</label>
            <input type="text" name="officialUrl" value="${escapeHtml(l.officialUrl || '')}" placeholder="https://…" />
          </div>
          <div class="modal-actions">
            <button type="submit" class="btn-primary">Save</button>
            <button type="button" class="btn-secondary cancel-modal">Cancel</button>
          </div>
        </form>
      `);
      const content = document.getElementById('modal-content');
      content.querySelector('.cancel-modal').onclick = hideModal;
      content.querySelector('#leader-form').onsubmit = (e) => {
        e.preventDefault();
        const f = e.target;
        const spectrumOrderRaw = f.spectrumOrder.value.trim();
        const spectrumOrder = spectrumOrderRaw === '' ? null : Number(spectrumOrderRaw);
        const coreValues = (f.coreValues.value || '')
          .split('\n')
          .map(s => s.trim())
          .filter(Boolean);
        const item = {
          id: l.id || uid(),
          spectrumOrder: Number.isFinite(spectrumOrder) ? spectrumOrder : null,
          spectrumLabel: f.spectrumLabel.value.trim(),
          name: f.name.value.trim(),
          partyName: f.partyName.value.trim(),
          photoUrl: f.photoUrl.value.trim(),
          briefCv: f.briefCv.value.trim(),
          motto: f.motto.value.trim(),
          coreValues,
          officialUrl: f.officialUrl.value.trim()
        };
        if (index !== 'new') data.leaders[+index] = item;
        else data.leaders.push(item);
        hideModal();
        renderLeaders();
      };
    }

    function deleteLeader(index) {
      if (!confirm('Delete this leader?')) return;
      data.leaders.splice(+index, 1);
      renderLeaders();
    }

    document.getElementById('add-leader').onclick = () => {
      data.leaders.push({
        id: uid(),
        spectrumOrder: '',
        spectrumLabel: '',
        name: '',
        partyName: '',
        photoUrl: '',
        briefCv: '',
        motto: '',
        coreValues: [],
        officialUrl: ''
      });
      editLeader(data.leaders.length - 1);
    };

    // ——— Skills ———
    function editSkill(index) {
      const s = data.skills[+index] || {};
      showModal('Edit skill', `
        <form id="skill-form">
          <div class="form-group">
            <label>Order (number)</label>
            <input type="number" name="order" value="${s.order != null ? s.order : ''}" placeholder="1" min="1" />
          </div>
          <div class="form-group">
            <label>Title</label>
            <input type="text" name="title" value="${escapeHtml(s.title || '')}" placeholder="e.g. Critical thinking" />
          </div>
          <div class="form-group">
            <label>Description</label>
            <textarea name="description" placeholder="What the user learns…">${escapeHtml(s.description || '')}</textarea>
          </div>
          <div class="modal-actions">
            <button type="submit" class="btn-primary">Save</button>
            <button type="button" class="btn-secondary cancel-modal">Cancel</button>
          </div>
        </form>
      `);
      const content = document.getElementById('modal-content');
      content.querySelector('.cancel-modal').onclick = hideModal;
      content.querySelector('#skill-form').onsubmit = (e) => {
        e.preventDefault();
        const f = e.target;
        const item = {
          id: s.id || uid(),
          order: f.order.value ? parseInt(f.order.value, 10) : data.skills.length + 1,
          title: f.title.value.trim(),
          description: f.description.value.trim()
        };
        if (index !== 'new') data.skills[+index] = item;
        else data.skills.push(item);
        hideModal();
        renderSkills();
      };
    }

    function deleteSkill(index) {
      if (!confirm('Delete this skill?')) return;
      data.skills.splice(+index, 1);
      renderSkills();
    }

    document.getElementById('add-skill').onclick = () => {
      data.skills.push({ id: uid(), order: data.skills.length + 1, title: '', description: '' });
      editSkill(data.skills.length - 1);
    };

    // ——— Quizzes ———
    function editQuiz(index) {
      const q = data.quizzes[+index] || { question: '', options: ['', '', ''], correct: 0 };
      const opts = (q.options && q.options.length) ? q.options : ['', '', ''];
      const optionsHtml = opts.map((opt, i) => `
        <div class="quiz-option-row" data-opt="${i}">
          <input type="radio" name="correct" value="${i}" ${i === q.correct ? 'checked' : ''} title="Correct answer" />
          <input type="text" name="opt" value="${escapeHtml(opt)}" placeholder="Option ${i + 1}" />
          <button type="button" class="rm-opt" title="Remove">✕</button>
        </div>
      `).join('');
      showModal('Edit quiz question', `
        <form id="quiz-form">
          <div class="form-group">
            <label>Question</label>
            <input type="text" name="question" value="${escapeHtml(q.question || '')}" placeholder="e.g. What is the main purpose of voting?" />
          </div>
          <div class="form-group">
            <label>Options (select the correct one)</label>
            <div class="quiz-options-list" id="quiz-opts-container">${optionsHtml}</div>
            <button type="button" class="quiz-add-opt" id="add-opt">+ Add option</button>
          </div>
          <div class="modal-actions">
            <button type="submit" class="btn-primary">Save</button>
            <button type="button" class="btn-secondary cancel-modal">Cancel</button>
          </div>
        </form>
      `);
      const content = document.getElementById('modal-content');
      content.querySelector('.cancel-modal').onclick = hideModal;

      const container = content.querySelector('#quiz-opts-container');
      content.querySelector('#add-opt').onclick = () => {
        const i = container.querySelectorAll('.quiz-option-row').length;
        const row = document.createElement('div');
        row.className = 'quiz-option-row';
        row.dataset.opt = i;
        row.innerHTML = `
          <input type="radio" name="correct" value="${i}" title="Correct answer" />
          <input type="text" name="opt" placeholder="Option ${i + 1}" />
          <button type="button" class="rm-opt" title="Remove">✕</button>
        `;
        row.querySelector('.rm-opt').onclick = () => row.remove();
        container.appendChild(row);
      };
      container.querySelectorAll('.rm-opt').forEach(btn => btn.onclick = () => btn.closest('.quiz-option-row').remove());

      content.querySelector('#quiz-form').onsubmit = (e) => {
        e.preventDefault();
        const opts = [...container.querySelectorAll('input[name="opt"]')].map(inp => inp.value.trim()).filter(Boolean);
        const correctVal = content.querySelector('input[name="correct"]:checked');
        const correct = correctVal ? parseInt(correctVal.value, 10) : 0;
        const item = {
          id: q.id || uid(),
          question: content.querySelector('input[name="question"]').value.trim(),
          options: opts.length ? opts : [''],
          correct: Math.min(correct, opts.length - 1)
        };
        if (index !== 'new') data.quizzes[+index] = item;
        else data.quizzes.push(item);
        hideModal();
        renderQuizzes();
      };
    }

    function deleteQuiz(index) {
      if (!confirm('Delete this question?')) return;
      data.quizzes.splice(+index, 1);
      renderQuizzes();
    }

    document.getElementById('add-quiz').onclick = () => {
      data.quizzes.push({ id: uid(), question: '', options: ['', '', ''], correct: 0 });
      editQuiz(data.quizzes.length - 1);
    };

    // Tabs
    document.querySelectorAll('.tabs button').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('panel-' + btn.dataset.tab).classList.add('active');
      });
    });

    // Save
    document.getElementById('save-btn').onclick = async () => {
      const msg = document.getElementById('save-msg');
      msg.className = 'msg';
      msg.textContent = 'Saving…';
      try {
        const r = await fetch(API, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        if (!r.ok) throw new Error(await r.text());
        msg.textContent = 'Saved.';
        msg.className = 'msg ok';
      } catch (e) {
        msg.textContent = 'Save failed. Is the server running?';
        msg.className = 'msg err';
      }
    };

    load();
  </script>
</body>
</html>
